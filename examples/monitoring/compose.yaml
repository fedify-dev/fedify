name: fedify-monitoring

services:
  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.154.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro,z
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:9464:9464"

  prometheus:
    image: docker.io/prom/prometheus:v3.5.4
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml:ro,z
      - ./prometheus-rules.yaml:/etc/prometheus/prometheus-rules.yaml:ro,z
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: docker.io/grafana/grafana:13.0.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_BASIC_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_PLUGINS_PREINSTALL: ""
      GF_PLUGINS_PREINSTALL_SYNC: ""
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro,z
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro,z
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro,z
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

  sample-metrics:
    image: docker.io/denoland/deno:2.7.13
    command:
      - deno
      - run
      - --unstable-otel
      - --config
      - /workspace/deno.json
      - --node-modules-dir=none
      - --allow-env
      - --allow-net
      - /workspace/sample-metrics.ts
    environment:
      OTEL_DENO: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_METRIC_EXPORT_INTERVAL: "1000"
      OTEL_SERVICE_NAME: fedify-monitoring-sample
    volumes:
      - ./deno.json:/workspace/deno.json:ro,z
      - ./sample-metrics.ts:/workspace/sample-metrics.ts:ro,z
    depends_on:
      - otel-collector
