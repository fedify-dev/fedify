volumes:
  harness-node-modules:

networks:
  smoke:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mastodon
      POSTGRES_USER: mastodon
      POSTGRES_PASSWORD: mastodon
    networks: [smoke]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mastodon"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    networks: [smoke]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # Fedify test harness — runs inside the Docker network so Mastodon's
  # Resolv::DNS can resolve "fedify-harness" natively via Docker DNS.
  fedify-harness:
    image: denoland/deno:latest
    working_dir: /workspace
    volumes:
      - ../../../:/workspace
      - harness-node-modules:/workspace/node_modules
    command:
      - run
      - --allow-net
      - --allow-env
      - --allow-read
      - --allow-write
      - --unstable-temporal
      - test/smoke/harness/main.ts
    environment:
      HARNESS_ORIGIN: "http://fedify-harness:3001"
    networks: [smoke]
    ports: ["3001:3001"]
    healthcheck:
      test:
        [
          "CMD",
          "deno",
          "eval",
          "const r = await fetch('http://localhost:3001/_test/health'); if (!r.ok) Deno.exit(1);",
        ]
      interval: 5s
      retries: 30

  mastodon-web:
    image: ghcr.io/mastodon/mastodon:v4.3.9
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    env_file: mastodon.env
    volumes:
      - ./disable_force_ssl.rb:/opt/mastodon/config/initializers/zz_disable_force_ssl.rb:ro
    networks:
      smoke:
        aliases: [mastodon]
    ports: ["3000:3000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:3000/health | grep -q OK",
        ]
      interval: 10s
      retries: 18

  mastodon-sidekiq:
    image: ghcr.io/mastodon/mastodon:v4.3.9
    command: bundle exec sidekiq -q ingress -q default -q push
    env_file: mastodon.env
    volumes:
      - ./disable_force_ssl.rb:/opt/mastodon/config/initializers/zz_disable_force_ssl.rb:ro
    networks: [smoke]
    depends_on:
      mastodon-web: { condition: service_healthy }
      fedify-harness: { condition: service_healthy }
